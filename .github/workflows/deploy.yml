name: Deploy WAR with Dynatrace (Wrapper)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # Make wrapper executable
      - name: Make wrapper executable
        run: chmod +x oneagent-installer-wrapper.sh

      # Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Deploy WAR
      - name: Deploy WAR
        uses: azure/webapps-deploy@v3
        with:
          app-name: MyTESTAPPS
          package: ROOT.war

      # Configure Dynatrace + Startup Script
      - name: Configure App Settings
        run: |
          az webapp config appsettings set \
            --name MyTESTAPPS \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings \
            DT_ENABLED=true \
            DT_TENANT=${{ secrets.DT_TENANT }} \
            DT_TENANTTOKEN=${{ secrets.DT_TENANTTOKEN }} \
            DT_CONNECTION_POINT=${{ secrets.DT_CONNECTION_POINT }} \
            WEBSITE_STARTUP_FILE=oneagent-installer-wrapper.sh \
            CATALINA_OPTS="-Dspring.profiles.active=dev -Dlogback.configurationFile=classpath:logback-spring.xml"

      # Restart App Service
      - name: Restart App
        run: |
          az webapp restart \
            --name MyTESTAPPS \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
