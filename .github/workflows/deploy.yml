name: Deploy WAR with Dynatrace (Hybrid Mode)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # Make wrapper executable
      - name: Make wrapper executable
        run: chmod +x oneagent-installer-wrapper.sh

      # Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Deploy WAR
      - name: Deploy WAR
        uses: azure/webapps-deploy@v3
        with:
          app-name: PrathameshTestApp
          package: sample.war

      # Configure App Settings (KEEP your config + wrapper)
      - name: Configure App Settings
        run: |
          az webapp config appsettings set \
            --name PrathameshTestApp \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings \
            DT_ENABLED=true \
            DT_TENANT=${{ secrets.DT_TENANT }} \
            DT_TENANTTOKEN=${{ secrets.DT_TENANTTOKEN }} \
            DT_CONNECTION_POINT=${{ secrets.DT_CONNECTION_POINT }} \
            START_APP_CMD="/home/site/wwwroot/oneagent-installer-wrapper.sh /usr/local/tomcat/bin/catalina.sh run"
            

      # Restart App
      - name: Restart App
        run: |
          az webapp restart \
            --name PrathameshTestApp  \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
