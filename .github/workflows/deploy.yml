name: Deploy WAR with Dynatrace (Java Agent Mode)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 🔹 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      #Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      #Deploy WAR to App Service
      - name: Deploy WAR
        uses: azure/webapps-deploy@v3
        with:
          app-name: MyTESTAPPS
          package: ROOT.war

      #Configure App Settings (Dynatrace + Tomcat)
      - name: Configure App Settings
        run: |
          az webapp config appsettings set \
            --name MyTESTAPPS \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings \
            DT_TENANT=${{ secrets.DT_TENANT }} \
            DT_TENANTTOKEN=${{ secrets.DT_TENANTTOKEN }} \
            DT_CONNECTION_POINT=${{ secrets.DT_CONNECTION_POINT }} \
            DT_ENABLED=true \
            CATALINA_OPTS= "-javaagent:/opt/dynatrace/oneagent/agent/lib64/liboneagentloader.so" \
            START_APP_CMD="/usr/local/tomcat/bin/catalina.sh run"

      #Restart App Service
      - name: Restart App
        run: |
          az webapp restart \
            --name MyTESTAPPS \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
