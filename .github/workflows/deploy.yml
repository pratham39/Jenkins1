name: Deploy WAR with Dynatrace

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      #Deploy WAR
      - name: Deploy WAR
        uses: azure/webapps-deploy@v3
        with:
          app-name: MyTESTAPPS
          package: ROOT.war

      #Configure Dynatrace (FIXED URL)
      - name: Configure Dynatrace
        run: |
          az webapp config appsettings set \
            --name MyTESTAPPS \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings \
            DT_TENANT=${{ secrets.DT_TENANT }} \
            DT_TENANTTOKEN=${{ secrets.DT_TENANTTOKEN }} \
            DT_CONNECTION_POINT=https://${{ secrets.DT_TENANT }} \
            DT_ENABLED=true

      #Startup Command (Manual OneAgent Install)
      - name: Set Startup Command
        run: |
          az webapp config set \
            --name MyTESTAPPS \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --startup-file "bash -c 'wget -O Dynatrace-OneAgent.sh https://${{ secrets.DT_TENANT }}/api/v1/deployment/installer/agent/unix/default/latest?Api-Token=${{ secrets.DT_TENANTTOKEN }}\&flavor=default\&include=java && chmod +x Dynatrace-OneAgent.sh && ./Dynatrace-OneAgent.sh APP_LOG_CONTENT_ACCESS=1 && export LD_PRELOAD=/opt/dynatrace/oneagent/agent/lib64/liboneagentproc.so && /usr/local/tomcat/bin/catalina.sh run'"

      #Restart App
      - name: Restart App
        run: |
          az webapp restart \
            --name MyTESTAPPS \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
