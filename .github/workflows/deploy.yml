name: Deploy WAR with Dynatrace (Corrected)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      #Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Deploy WAR
      - name: Deploy WAR
        uses: azure/webapps-deploy@v3
        with:
          app-name: PrathameshTestApp
          package: sample.war

      # Upload wrapper script to App Service
      - name: Upload OneAgent Wrapper
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name PrathameshTestApp \
            --src-path oneagent-installer-wrapper.sh \
            --type static

      # 5. Configure App Settings (CRITICAL)
      - name: Configure App Settings
        run: |
          az webapp config appsettings set \
            --name PrathameshTestApp \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings \
            DT_CONNECTION_POINT=${{ secrets.DT_CONNECTION_POINT }} \
            DT_TENANTTOKEN=${{ secrets.DT_TENANTTOKEN }} \
            CATALINA_OPTS="-javaagent:/home/site/wwwroot/oneagent/agent/lib64/liboneagentloader.so" \
            START_APP_CMD="chmod +x /home/site/wwwroot/oneagent-installer-wrapper.sh && /home/site/wwwroot/oneagent-installer-wrapper.sh && export CATALINA_OPTS=\"\$CATALINA_OPTS\" && /usr/local/tomcat/bin/catalina.sh run"

      # 6. Restart App
      - name: Restart App
        run: |
          az webapp restart \
            --name PrathameshTestApp \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
