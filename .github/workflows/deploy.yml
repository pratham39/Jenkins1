name: Deploy WAR with Dynatrace (Final Fixed)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      #Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      #Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      #Deploy WAR
      - name: Deploy WAR
        uses: azure/webapps-deploy@v3
        with:
          app-name: PRATHAMTESTWEB
          package: sample.war

      #Upload OneAgent Wrapper to App Service (FIXED)
      - name: Upload OneAgent Wrapper
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name PRATHAMTESTWEB \
            --src-path oneagent-installer-wrapper.sh \
            --type static \
            --target-path /home/site/wwwroot/oneagent-installer-wrapper.sh

      #Configure App Settings (CRITICAL)
      - name: Configure App Settings
        run: |
          az webapp config appsettings set \
            --name PRATHAMTESTWEB \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings \
            DT_CONNECTION_POINT=${{ secrets.DT_CONNECTION_POINT }} \
            DT_TENANTTOKEN=${{ secrets.DT_TENANTTOKEN }} \
            

      #Restart App Service
      - name: Restart App
        run: |
          az webapp restart \
            --name PRATHAMTESTWEB \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}

