name: Deploy WAR with Dynatrace (Final Fixed)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      #Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      #Azure Login
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      #Deploy WAR
      - name: Deploy WAR
        uses: azure/webapps-deploy@v3
        with:
          app-name: PrathameshTestApp
          package: sample.war


      #Configure App Settings (CRITICAL)
      - name: Configure App Settings
        run: |
          az webapp config appsettings set \
            --name PrathameshTestApp \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --settings \
            DT_CONNECTION_POINT=${{ secrets.DT_CONNECTION_POINT }} \
            DT_TENANTTOKEN=${{ secrets.DT_TENANTTOKEN }} \
     

      #Restart App Service
      - name: Restart App
        run: |
          az webapp restart \
            --name PrathameshTestApp \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
