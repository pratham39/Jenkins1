name: Deploy WAR with Dynatrace

on:
push:
branches:
- main
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'microsoft'

  - run: mvn clean package

  - uses: actions/upload-artifact@v4
    with:
      name: app
      path: target/*.war

deploy:
runs-on: ubuntu-latest
needs: build

steps:
  - uses: actions/download-artifact@v4
    with:
      name: app

  - uses: azure/login@v2
    with:
      creds: ${{ secrets.AZURE_CREDENTIALS }}

  - uses: azure/webapps-deploy@v3
    with:
      app-name: MyTESTAPPS
      package: '*.war'

  - name: Configure Dynatrace
    run: |
      az webapp config appsettings set \
        --name MyTESTAPPS \
        --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
        --settings \
        DT_TENANT=${{ secrets.DT_TENANT }} \
        DT_TENANTTOKEN=${{ secrets.DT_TENANTTOKEN }} \
        DT_CONNECTION_POINT=${{ secrets.DT_CONNECTION_POINT }} \
        START_APP_CMD="catalina.sh run"

  - name: Restart App
    run: |
      az webapp restart \
        --name MyTESTAPPS \
        --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
