name: Build and Deploy WAR with Dynatrace

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Setup Java
    uses: actions/setup-java@v4
    with:
      java-version: '17'
      distribution: 'microsoft'

  - name: Build WAR
    run: mvn clean package

  - name: Upload Artifact
    uses: actions/upload-artifact@v4
    with:
      name: app
      path: target/*.war
```

deploy:
runs-on: ubuntu-latest
needs: build

```
steps:
  - name: Download Artifact
    uses: actions/download-artifact@v4
    with:
      name: app

  # 🔐 Login to Azure
  - name: Azure Login
    uses: azure/login@v2
    with:
      creds: ${{ secrets.AZURE_CREDENTIALS }}

  # 🚀 Deploy WAR
  - name: Deploy to Azure App Service
    uses: azure/webapps-deploy@v3
    with:
      app-name: MyTESTAPPS
      package: '*.war'

  # 🔥 Configure Dynatrace
  - name: Configure Dynatrace Settings
    run: |
      az webapp config appsettings set \
        --name MyTESTAPPS \
        --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
        --settings \
        DT_TENANT=${{ secrets.DT_TENANT }} \
        DT_TENANTTOKEN=${{ secrets.DT_TENANTTOKEN }} \
        DT_CONNECTION_POINT=${{ secrets.DT_CONNECTION_POINT }} \
        START_APP_CMD="catalina.sh run"

  # 🔄 Restart App
  - name: Restart App Service
    run: |
      az webapp restart \
        --name MyTESTAPPS \
        --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }}
```
